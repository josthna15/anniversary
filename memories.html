<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<style>
body {
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: flex-start; /* better for scrolling */
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    margin: 0;
    text-align: center;
    padding: 15px;
    min-height: 100vh; /* instead of fixed height */
}

/* TITLE */
h1 {
    color: red;
    margin-bottom: 15px;
    font-size: 22px;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 500px;
}

/* MEMORY CARD */
.memory {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s;
}

.memory:hover {
    transform: scale(1.03);
}

/* IMAGE */
.memory img {
    width: 100%;
    height: 150px; /* reduced for mobile */
    object-fit: cover;
    border-radius: 10px;
}

/* MESSAGE OVERLAY */
.memory-message {
    position: absolute;
    bottom: 0; /* move to bottom for better visibility */
    left: 0;
    right: 0;
    background-color: rgba(255, 255, 255, 0.8);
    font-size: 14px;
    color: #333;
    padding: 6px;
    text-align: center;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
    padding: 10px;
}

.modal img {
    max-width: 100%;
    max-height: 80%;
    border-radius: 10px;
}

/* CLOSE BUTTON */
.close {
    position: absolute;
    top: 15px;
    right: 20px;
    color: white;
    font-size: 28px;
    cursor: pointer;
}

/* TABLET / DESKTOP */
@media (min-width: 768px) {
    h1 {
        font-size: 30px;
    }

    .gallery {
        max-width: 700px;
        gap: 15px;
    }

    .memory img {
        height: 220px;
    }

    .memory-message {
        font-size: 16px;
        padding: 10px;
    }
}
</style>
</head>

<body>

<h1>Our Special Memories 💖 (tap image)</h1>

<div class="gallery">

    <div class="memory" data-full-image="m3.jpeg">
        <img src="m3.jpeg">
        <div class="memory-message">Daddy bright smile</div>
    </div>

    <div class="memory" data-full-image="m4.jpeg">
        <img src="m4.jpeg">
        <div class="memory-message">Naanu hostel vadlina day</div>
    </div>

    <div class="memory" data-full-image="m5.jpeg">
        <img src="m5.jpeg">
        <div class="memory-message">Mana trip</div>
    </div>

    <div class="memory" data-full-image="my.jpeg">
        <img src="my.jpeg">
        <div class="memory-message">Maa in Gandipet park</div>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <span class="close" id="closeModal">&times;</span>
    <img id="modalImage">
</div>

<script>
const memories = document.querySelectorAll('.memory');
const modal = document.getElementById('modal');
const modalImage = document.getElementById('modalImage');
const closeModal = document.getElementById('closeModal');

memories.forEach(memory => {
    memory.addEventListener('click', function () {
        modalImage.src = this.getAttribute('data-full-image');
        modal.style.display = "flex";
    });
});

closeModal.addEventListener('click', () => modal.style.display = "none");
modal.addEventListener('click', () => modal.style.display = "none");
</script>

</body>
</html>
